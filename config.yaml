model:
  default: coder
  provider: custom
  base_url: https://agents.gin1111.dev/v1
  api_key: ${GIN_API_KEY}
display:
  skin: mono
moa:
  presets:
    default:
      reference_models:
        - provider: custom:agents.gin1111.dev
          model: kr/claude-opus-4.8-thinking
        - provider: custom:agents.gin1111.dev
          model: kr/gpt-5.6-terra
        - provider: custom:agents.gin1111.dev
          model: nvidia/deepseek-ai/deepseek-v4-pro
      aggregator:
        provider: custom:agents.gin1111.dev
        model: cx/gpt-5.6-sol
      fanout: per_iteration
  reference_models:
    - provider: custom:agents.gin1111.dev
      model: kr/claude-opus-4.8-thinking
    - provider: custom:agents.gin1111.dev
      model: kr/gpt-5.6-terra
    - provider: custom:agents.gin1111.dev
      model: nvidia/deepseek-ai/deepseek-v4-pro
  aggregator:
    provider: custom:agents.gin1111.dev
    model: cx/gpt-5.6-sol
  max_tokens: 4096
  fanout: per_iteration
  enabled: true
memory:
  memory_enabled: true
  user_profile_enabled: true
  memory_char_limit: 2200
  user_char_limit: 1375
  provider: byterover
  byterover:
    auto_extract: false
skills:
  external_dirs:
    - ${HOME}/.agents/skills
    - /home/aioz/personal/gin-harness/skills
  write_approval: true
_config_version: 33
custom_providers:
  - api_key: ${GIN_API_KEY}
    base_url: ${GIN_BASE_URL}
    default: coder
    name: agents.gin1111.dev
platform_toolsets:
  cli:
    - code_execution
    - delegation
    - file
    - kanban
    - mcp-codegraph
    - memory
    - session_search
    - skills
    - terminal
    - todo
    - vision
    - web
mcp_servers:
  codegraph:
    command: codegraph
    args:
      - serve
      - --mcp
    timeout: 120
    connect_timeout: 60
    enabled: true
known_plugin_toolsets:
  cli:
    - spotify
plugins:
  enabled:
    - ginflow-gate
